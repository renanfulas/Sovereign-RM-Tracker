<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign RM Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        
        <section id="login-page" class="card active">
            <h2>Acesso</h2>
            <input type="text" id="login-username" placeholder="Usuário ou E-mail">
            <input type="password" id="login-password" placeholder="Senha">
            <button id="login-button" class="btn-primary">Entrar</button>
            <p>Não tem uma conta? <a href="#" id="show-register-link">Cadastre-se</a></p>
        </section>

        <section id="register-page" class="card hidden">
            <h2>Cadastro</h2>
            <input type="text" id="register-username" placeholder="Nome de usuário">
            <input type="email" id="register-email" placeholder="E-mail">
            <input type="password" id="register-password" placeholder="Senha">
            <button id="register-button" class="btn-primary">Cadastrar</button>
            <p>Já tem uma conta? <a href="#" id="show-login-link">Faça login</a></p>
        </section>

        <section id="app-page" class="card hidden">
            <header class="app-header">
                <h2 id="welcome-msg">Meus Treinos</h2>
                <button id="logout-button" class="btn-small">Sair</button>
            </header>

            <div class="card add-card">
                <div class="inline-form">
                    <input type="text" id="exercise-name" placeholder="Exercício">
                    <input type="number" id="rm-value" placeholder="Kg">
                    <button id="save-rm-button">Salvar</button>
                </div>
            </div>

            <ul id="rm-list" class="rm-list">
                
            </ul>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
